## /etc/nginx/sites-available/tz-schedule-validation.quickdemo.site
## Symlink into sites-enabled, then: sudo nginx -t && sudo systemctl reload nginx
## TLS: sudo certbot --nginx -d tz-schedule-validation.quickdemo.site
##      (Certbot rewrites this block to add `listen 443 ssl` + an HTTP->HTTPS redirect.)
## NOTE: site is public (no auth). To gate it, add inside `location /`:
##   auth_basic "TZ Schedule Validation"; auth_basic_user_file /etc/nginx/.htpasswd-tzsv;

server {
    server_name tz-schedule-validation.quickdemo.site;

    # Uploads: raw export can be a few MB; allow headroom.
    client_max_body_size 50M;

    gzip on;
    gzip_vary on;
    gzip_comp_level 6;
    gzip_types text/plain text/css text/javascript application/json application/javascript;
    gzip_min_length 256;

    location / {
        proxy_pass http://127.0.0.1:8090;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
    }

    listen 80;
}
