name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Set up SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.VPS_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H "${{ secrets.VPS_HOST }}" >> ~/.ssh/known_hosts 2>/dev/null

      - name: Deploy over SSH
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_USER: ${{ secrets.VPS_USER }}
          APP_DIR: ${{ secrets.VPS_APP_DIR }}
        run: |
          ssh -i ~/.ssh/deploy_key "$VPS_USER@$VPS_HOST" \
            "APP_DIR='${APP_DIR:-/home/ubuntu/tz-schedule-validation}' bash -s" <<'REMOTE'
            set -euo pipefail
            cd "${APP_DIR:-/home/ubuntu/tz-schedule-validation}"
            git fetch --all
            git reset --hard origin/main
            docker compose up -d --build
            docker image prune -f
            echo "Deployed: $(git rev-parse --short HEAD)"
          REMOTE
